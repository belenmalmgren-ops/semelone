name: xiaofang_dict
description: 小方新华字典 - 一款跨平台的新华字典应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 本地存储
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # UI组件
  flutter_svg: ^2.0.9
  flutter_screenutil: ^5.9.0
  
  # 工具
  connectivity_plus: ^5.0.2
  path: ^1.8.3
  
  # 图标
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/db/
    - assets/strokes/
    - assets/images/
