name: xiaofang_dict
description: 小方新华字典 - 一款跨平台的新华字典应用
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 本地存储
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # UI组件
  flutter_svg: ^2.0.9
  flutter_screenutil: ^5.9.0
  
  # 工具
  connectivity_plus: ^5.0.2
  path: ^1.8.3
  share_plus: ^7.0.0

  # 手写识别
  google_mlkit_digital_ink_recognition: ^0.12.0

  # 图表
  fl_chart: ^0.69.0

  # 图标
  cupertino_icons: ^1.0.8

  # 语音朗读
  flutter_tts: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/db/
    - assets/strokes/
    - assets/images/
